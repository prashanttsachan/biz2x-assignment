services:
  finwell:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - LLM_API_TOKEN=${LLM_API_TOKEN:-}
      - LLM_WRAPPER_URL=${LLM_WRAPPER_URL:-https://llm-wrapper-741152993481.asia-south1.run.app}
    volumes:
      - finwell-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  finwell-data:
